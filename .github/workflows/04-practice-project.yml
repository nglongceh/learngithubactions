name: 04 Practice Project CI

on:
  push:
    paths:
      - '04+Practice+Project+(Start)/**'
  pull_request:
    paths:
      - '04+Practice+Project+(Start)/**'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./04+Practice+Project+(Start)/04 Practice Project (Start)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: 04+Practice+Project+(Start)/04 Practice Project (Start)/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  build:
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./04+Practice+Project+(Start)/04 Practice Project (Start)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: 04+Practice+Project+(Start)/04 Practice Project (Start)/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

  test:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./04+Practice+Project+(Start)/04 Practice Project (Start)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: 04+Practice+Project+(Start)/04 Practice Project (Start)/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
